<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <rect id="r" x="8" y="4" width="22" height="32" rx="4"/>
  </defs>
  <!-- Card left -->
  <g transform="rotate(-12 32 32)">
    <rect x="6" y="8" width="22" height="32" rx="4" fill="url(#g)" opacity="0.85"/>
    <rect x="8" y="10" width="18" height="28" rx="3" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Card right -->
  <g transform="rotate(12 32 32)">
    <rect x="36" y="8" width="22" height="32" rx="4" fill="url(#g)" opacity="0.85"/>
    <rect x="38" y="10" width="18" height="28" rx="3" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Center number -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="white">5</text>
</svg>
