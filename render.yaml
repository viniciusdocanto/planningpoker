services:
  - type: web
    name: planning-poker-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # preencha no dashboard do Render com a URL do seu site
      - key: REDIS_URL
        fromService:
          type: redis
          name: planning-poker-redis
          property: connectionString
    healthCheckPath: /

databases:
  - type: redis
    name: planning-poker-redis
    ipAllowList: []   # only accessible internally by the web service
