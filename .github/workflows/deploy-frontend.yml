name: Deploy Frontend → Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build de produção
        working-directory: frontend
        env:
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: npm run build

      - name: 🔧 Normalizar diretório FTP
        id: ftp-dir
        run: |
          DIR="${{ secrets.FTP_SERVER_DIR }}"
          if [ -z "$DIR" ]; then DIR="public_html"; fi
          if [[ "${DIR: -1}" != "/" ]]; then DIR="${DIR}/"; fi
          echo "value=$DIR" >> $GITHUB_OUTPUT

      - name: 🚀 Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ steps.ftp-dir.outputs.value }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
